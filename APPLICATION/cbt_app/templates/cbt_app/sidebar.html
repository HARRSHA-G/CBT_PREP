    <!-- Off-Canvas Drawer Overlay for Mobile -->
    <div id="drawerOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden transition-opacity duration-300 md:hidden"></div>

    <!-- Modern Sidebar Panel -->
    <aside id="sidebarDrawer" class="fixed top-[72px] bottom-[36px] md:bottom-auto md:top-auto left-0 z-40 w-64 md:w-72 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:static flex flex-col shrink-0 border-r custom-border justify-between" style="background-color: var(--bg-card);">
        <div class="flex flex-col flex-grow h-full md:h-auto overflow-hidden">
            <!-- Sidebar Title Section -->
            <div class="px-6 py-6 border-b custom-border hidden md:block shrink-0">
                <span class="text-[10px] custom-text-muted font-bold tracking-widest uppercase">Candidate Portal</span>
                <h3 class="text-base font-black tracking-wider text-neutral-800 dark:text-white mt-1">Practice Hub</h3>
            </div>

            <!-- Tab Navigation Links -->
            <nav class="flex-grow py-6 px-4 space-y-2.5 overflow-y-auto">
                <span class="px-4 text-[10px] custom-text-muted font-bold tracking-widest uppercase block mb-2">Practice Workspaces</span>
                
                {% if is_dashboard %}
                    <button data-tab="full-mock" class="sidebar-tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-xs font-black tracking-wider uppercase transition-all duration-300 border-l-4 border-transparent hover:bg-neutral-800/5 hover:-translate-y-[0.5px] group text-left">
                        <svg class="w-4 h-4 text-[#ff6600] transition-transform duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <span>Mock Tests</span>
                    </button>
                {% else %}
                    <a href="{% url 'dashboard' %}#full-mock" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-xs font-black tracking-wider uppercase transition-all duration-300 border-l-4 border-transparent hover:bg-neutral-800/5 hover:-translate-y-[0.5px] group text-left">
                        <svg class="w-4 h-4 text-[#ff6600] transition-transform duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <span>Mock Tests</span>
                    </a>
                {% endif %}

                <!-- Bulk Import moved exactly after Mock Tests -->
                <a href="{% url 'import_questions' %}" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-xs font-black tracking-wider uppercase transition-all duration-300 border-l-4 border-transparent hover:bg-neutral-800/5 hover:-translate-y-[0.5px] group text-left {% if request.resolver_match.url_name == 'import_questions' %}bg-neutral-800/5 border-l-[#ff6600] text-[#ff6600]{% endif %}">
                    <svg class="w-4 h-4 text-[#ff6600] transition-transform duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                    <span>Bulk Import JSON</span>
                </a>

                <div class="h-[1px] bg-neutral-800/10 dark:bg-neutral-800/40 my-3"></div>
                <span class="px-4 text-[10px] custom-text-muted font-bold tracking-widest uppercase block mb-2">Performance Center</span>

                {% if is_dashboard %}
                    <button data-tab="performance" class="sidebar-tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-xs font-black tracking-wider uppercase transition-all duration-300 border-l-4 border-transparent hover:bg-neutral-800/5 hover:-translate-y-[0.5px] group text-left">
                        <svg class="w-4 h-4 text-[#ff6600] transition-transform duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2"/>
                        </svg>
                        <span>Performance Matrix</span>
                    </button>
                    <button data-tab="history" class="sidebar-tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-xs font-black tracking-wider uppercase transition-all duration-300 border-l-4 border-transparent hover:bg-neutral-800/5 hover:-translate-y-[0.5px] group text-left">
                        <svg class="w-4 h-4 text-[#ff6600] transition-transform duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span>Attempt Logs History</span>
                    </button>
                {% else %}
                    <a href="{% url 'dashboard' %}#performance" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-xs font-black tracking-wider uppercase transition-all duration-300 border-l-4 border-transparent hover:bg-neutral-800/5 hover:-translate-y-[0.5px] group text-left">
                        <svg class="w-4 h-4 text-[#ff6600] transition-transform duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2"/>
                        </svg>
                        <span>Performance Matrix</span>
                    </a>
                    <a href="{% url 'dashboard' %}#history" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-xs font-black tracking-wider uppercase transition-all duration-300 border-l-4 border-transparent hover:bg-neutral-800/5 hover:-translate-y-[0.5px] group text-left">
                        <svg class="w-4 h-4 text-[#ff6600] transition-transform duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span>Attempt Logs History</span>
                    </a>
                {% endif %}
            </nav>
        </div>

        <!-- Sidebar Controls & Info Tag -->
        <div class="px-4 py-6 border-t custom-border space-y-4">
            <div class="px-2 space-y-2">
                <!-- Admin Link -->
                <a href="{% url 'auto_admin_login' %}" target="_blank" class="flex items-center justify-center gap-1.5 py-2.5 px-3 border custom-border rounded-lg text-[10px] uppercase tracking-wide hover:border-[#ff6600] transition-all font-extrabold text-neutral-800 dark:text-neutral-200 w-full" style="background-color: var(--bg-card);">
                    <svg class="w-4 h-4 text-[#ff6600]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span>Admin Control Panel</span>
                </a>

                <!-- Candidate Profile Link -->
                <a href="{% url 'candidate_profile' %}" class="flex items-center justify-center gap-1.5 py-2.5 px-3 border border-[#ff6600] bg-[#ff6600]/10 rounded-lg text-[10px] uppercase tracking-wide hover:bg-[#ff6600]/20 transition-all font-black text-[#ff6600] w-full mt-2">
                    <svg class="w-4 h-4 text-[#ff6600]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span>Candidate Profile</span>
                </a>
            </div>
        </div>
    </aside>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebarDrawer = document.getElementById('sidebarDrawer');
            const drawerOverlay = document.getElementById('drawerOverlay');
            const menuToggleBtn = document.getElementById('menuToggleBtn');
            
            if (menuToggleBtn && sidebarDrawer && drawerOverlay) {
                menuToggleBtn.addEventListener('click', () => {
                    sidebarDrawer.classList.remove('-translate-x-full');
                    drawerOverlay.classList.remove('hidden');
                });
            }
            if (drawerOverlay && sidebarDrawer) {
                drawerOverlay.addEventListener('click', () => {
                    sidebarDrawer.classList.add('-translate-x-full');
                    drawerOverlay.classList.add('hidden');
                });
            }
        });
    </script>
